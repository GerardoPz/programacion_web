<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Blog Web 2.0</title>
    <style>
        body {
            background-color: #e6f3ff;
            /* Fondo azul pastel */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .contenedor {
            width: 80%;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            /* Bordes redondeados clásicos de los 2000s */
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        h1 {
            color: #ff6600;
            /* Naranja web 2.0 */
            text-shadow: 1px 1px 2px #ccc;
        }

        /* Botón con efecto de cristal o 'glossy' */
        .boton-glossy {
            background: linear-gradient(to bottom, #a3d9ff 0%, #3e9ce0 50%, #1e70b9 51%, #45a0d9 100%);
            border: 1px solid #1a5b99;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0px 1px 0px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <h1>Mi Espacio Web 2.0</h1>
        <p>¡Deja un comentario! Ahora la web es interactiva. Nace la tecnología AJAX y las primeras redes sociales.</p>
        <button class="boton-glossy">Agregar Comentario</button>
    </div>
</body>

</html>
